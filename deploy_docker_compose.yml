version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bit_health_db
    environment:
      POSTGRES_USER: bit_health_user
      POSTGRES_PASSWORD: bit_health_password
      POSTGRES_DB: bit_health_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: always

  backend:
    build: ./backend
    container_name: bit_health_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://bit_health_user:bit_health_password@db:5432/bit_health_db
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      TZ: Asia/Seoul
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://book.bit.kr
    container_name: bit_health_frontend
    environment:
      NEXT_PUBLIC_API_URL: https://book.bit.kr
      TZ: Asia/Seoul
    depends_on:
      - backend
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: bit_health_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
